name: Sync Cmdlet Documentation

on:
  pull_request:
    paths:
      - "XDRInternals/functions/**"
      - "README.md"
      - "XDRInternals/XDRInternals.psd1"
      - "XDRay/CmdletApiMapping.json"
      - "XDRay Firefox/CmdletApiMapping.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Run cmdlet documentation sync
        shell: pwsh
        run: |
          .\build\Sync-CmdletDocumentation.ps1 -Verbose

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true' && (github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.fork == false)
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync cmdlet documentation"
          title: "chore: sync cmdlet documentation"
          body: |
            This PR automatically updates:
            - README.md cmdlet table
            - XDRInternals.psd1 FunctionsToExport array
            - XDRay/CmdletApiMapping.json API mappings
            - XDRay Firefox/CmdletApiMapping.json API mappings

            Generated by sync-cmdlet-docs workflow.
          branch: sync-cmdlet-docs-${{ github.head_ref || github.ref_name }}
          delete-branch: true
