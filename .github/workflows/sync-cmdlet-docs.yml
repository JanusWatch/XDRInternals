name: Sync Cmdlet Documentation

on:
  push:
    branches-ignore:
      - "sync-cmdlet-docs-**"
    paths:
      - "XDRInternals/functions/**"
      - "build/Sync-CmdletDocumentation.ps1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-cmdlet-docs-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  sync-docs:
    if: github.event_name != 'push' || !startsWith(github.ref_name, 'sync-cmdlet-docs-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Run cmdlet documentation sync
        shell: pwsh
        run: |
          .\build\Sync-CmdletDocumentation.ps1 -Verbose

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync cmdlet documentation"
          title: "chore: sync cmdlet documentation"
          body: |
            This PR automatically updates:
            - README.md cmdlet table
            - XDRInternals.psd1 FunctionsToExport array
            - XDRay/CmdletApiMapping.json API mappings
            - XDRay Firefox/CmdletApiMapping.json API mappings

            Generated by sync-cmdlet-docs workflow.
          add-paths: |
            README.md
            XDRInternals/XDRInternals.psd1
            XDRay/CmdletApiMapping.json
            XDRay Firefox/CmdletApiMapping.json
          branch: sync-cmdlet-docs-${{ github.ref_name }}
          base: ${{ github.ref_name }}
          delete-branch: true

      - name: Report pull request
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "pull-request-number=${{ steps.cpr.outputs.pull-request-number }}" >> $GITHUB_STEP_SUMMARY
          echo "pull-request-url=${{ steps.cpr.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY
